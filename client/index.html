<!doctype html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>PLA Pantry</title>    
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,300;0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700;0,14..32,800;1,14..32,400&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  </head>

  <body>
    <div id="root"></div>
    <script>
      if (window.location.protocol === "file:") {
        document.getElementById("root").innerHTML = `
          <main style="min-height:100vh;display:grid;place-items:center;background:#050506;color:#f7f4ea;font-family:Inter,system-ui,sans-serif;padding:24px;">
            <section style="max-width:560px;line-height:1.5;">
              <h1 style="font-size:24px;margin:0 0 12px;">PLA Pantry needs the dev server</h1>
              <p style="color:#b9b3a3;margin:0;">
                This Vite app cannot run from a file preview. Start the app with <code>pnpm dev</code>, then open the localhost URL.
              </p>
            </section>
          </main>
        `;
      }
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>

</html>
